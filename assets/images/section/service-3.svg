<svg width="424" height="530" viewBox="0 0 424 530" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0.12} }
      @keyframes ring    { 0%,100%{opacity:0.2} 50%{opacity:0.55} }
      @keyframes flowA   { to { stroke-dashoffset: -22; } }
      @keyframes flowB   { to { stroke-dashoffset: -22; } }
      @keyframes flowC   { to { stroke-dashoffset: -22; } }
      @keyframes flowD   { to { stroke-dashoffset: -22; } }
      @keyframes popIn   { 0%{opacity:0;transform:scale(0.85)} 100%{opacity:1;transform:scale(1)} }
      .pulse-dot  { animation: blink 1.4s ease-in-out infinite; }
      .pulse-ring { animation: ring  1.4s ease-in-out infinite; }
      .line1 { stroke-dasharray:7,5; animation: flowA 1.1s linear 0.0s infinite; }
      .line2 { stroke-dasharray:7,5; animation: flowB 1.1s linear 0.3s infinite; }
      .line3 { stroke-dasharray:7,5; animation: flowC 1.1s linear 0.6s infinite; }
      .line4 { stroke-dasharray:7,5; animation: flowD 1.1s linear 0.9s infinite; }
    </style>
    <pattern id="g3" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0L0 0 0 32" fill="none" stroke="rgba(255,255,255,0.022)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="424" height="530" fill="#080808"/>
  <rect width="424" height="530" fill="url(#g3)"/>
  <rect x="0" y="0" width="424" height="2" fill="#00ff66"/>

  <!-- HEADER -->
  <rect x="0" y="2" width="424" height="60" fill="#0c0c0c"/>
  <rect x="0" y="61" width="424" height="1" fill="rgba(0,255,102,0.1)"/>
  <rect x="18" y="14" width="30" height="30" rx="6" fill="rgba(0,255,102,0.06)" stroke="rgba(0,255,102,0.28)" stroke-width="1"/>
  <text x="33" y="34" font-family="monospace" font-size="13" fill="#00ff66" text-anchor="middle" font-weight="700">C</text>
  <text x="58" y="30" font-family="monospace" font-size="9.5" fill="rgba(255,255,255,0.88)" letter-spacing="2.5" font-weight="700">FLOW ENGINE</text>
  <text x="58" y="46" font-family="monospace" font-size="6" fill="rgba(0,255,102,0.45)" letter-spacing="1.5">COMAA AUTOMATION</text>
  <circle cx="390" cy="25" r="10" fill="rgba(0,255,102,0.08)" class="pulse-ring"/>
  <circle cx="390" cy="25" r="4" fill="#00ff66" class="pulse-dot"/>
  <text x="390" y="43" font-family="monospace" font-size="5.5" fill="rgba(0,255,102,0.55)" text-anchor="middle" letter-spacing="1">LIVE</text>

  <!-- Central vertical guide line (decorative, very faint) -->
  <line x1="212" y1="78" x2="212" y2="460" stroke="rgba(0,255,102,0.04)" stroke-width="1"/>

  <!-- ══ NODE 1 — Prospect Identified ══ -->
  <rect x="32" y="78" width="360" height="60" rx="6" fill="#0e0e0e" stroke="#00ff66" stroke-width="1.2"/>
  <!-- Step label -->
  <text x="376" y="97" font-family="monospace" font-size="7" fill="rgba(0,255,102,0.4)" text-anchor="end" letter-spacing="1">01</text>
  <!-- Icon circle -->
  <circle cx="66" cy="108" r="18" fill="rgba(0,255,102,0.08)" stroke="rgba(0,255,102,0.35)" stroke-width="1.2"/>
  <!-- Person icon -->
  <circle cx="66" cy="103" r="5" fill="none" stroke="#00ff66" stroke-width="1.3"/>
  <path d="M 55 118 Q 66 111 77 118" fill="none" stroke="#00ff66" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Text -->
  <text x="96" y="101" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.9)" font-weight="600">Prospect Identified</text>
  <text x="96" y="116" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.3)">ICP match detected · Score 91/100</text>
  <!-- Status badge -->
  <rect x="96" y="122" width="62" height="11" rx="3" fill="rgba(0,255,102,0.12)" stroke="rgba(0,255,102,0.35)" stroke-width="0.6"/>
  <text x="127" y="130.5" font-family="monospace" font-size="5.5" fill="#00ff66" text-anchor="middle" letter-spacing="0.5">✓ QUALIFIED</text>

  <!-- CONNECTOR 1 (animated flow line) -->
  <line x1="212" y1="138" x2="212" y2="162" stroke="rgba(0,255,102,0.55)" stroke-width="1.5" class="line1" filter="url(#glow1)"/>
  <polygon points="212,166 207,157 217,157" fill="#00ff66" opacity="0.7"/>

  <!-- ══ NODE 2 — Sequence Triggered ══ -->
  <rect x="32" y="166" width="360" height="60" rx="6" fill="#0e0e0e" stroke="rgba(0,255,102,0.6)" stroke-width="1.2"/>
  <text x="376" y="185" font-family="monospace" font-size="7" fill="rgba(0,255,102,0.35)" text-anchor="end" letter-spacing="1">02</text>
  <circle cx="66" cy="196" r="18" fill="rgba(0,255,102,0.07)" stroke="rgba(0,255,102,0.28)" stroke-width="1.2"/>
  <!-- Sequence / list icon -->
  <line x1="58" y1="190" x2="74" y2="190" stroke="#00ff66" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="58" y1="196" x2="74" y2="196" stroke="#00ff66" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="58" y1="202" x2="68" y2="202" stroke="#00ff66" stroke-width="1.2" stroke-linecap="round"/>
  <text x="96" y="189" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.87)" font-weight="600">Sequence Triggered</text>
  <text x="96" y="204" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.28)">5-step email flow initiated · Day 1</text>
  <rect x="96" y="210" width="58" height="11" rx="3" fill="rgba(0,255,102,0.1)" stroke="rgba(0,255,102,0.3)" stroke-width="0.6"/>
  <text x="125" y="218.5" font-family="monospace" font-size="5.5" fill="#00ff66" text-anchor="middle" letter-spacing="0.5">AUTOMATED</text>

  <!-- CONNECTOR 2 -->
  <line x1="212" y1="226" x2="212" y2="250" stroke="rgba(0,255,102,0.5)" stroke-width="1.5" class="line2" filter="url(#glow1)"/>
  <polygon points="212,254 207,245 217,245" fill="#00ff66" opacity="0.65"/>

  <!-- ══ NODE 3 — Follow-Up Sent ══ -->
  <rect x="32" y="254" width="360" height="60" rx="6" fill="#0e0e0e" stroke="rgba(0,255,102,0.45)" stroke-width="1.2"/>
  <text x="376" y="273" font-family="monospace" font-size="7" fill="rgba(0,255,102,0.3)" text-anchor="end" letter-spacing="1">03</text>
  <circle cx="66" cy="284" r="18" fill="rgba(0,255,102,0.06)" stroke="rgba(0,255,102,0.22)" stroke-width="1.2"/>
  <!-- Email send icon -->
  <polygon points="56,279 80,284 56,289 60,284" fill="#00ff66" opacity="0.8"/>
  <text x="96" y="277" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.84)" font-weight="600">Follow-Up Sent</text>
  <text x="96" y="292" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.26)">Opened 43% · Replied 19% · Day 3</text>
  <rect x="96" y="298" width="44" height="11" rx="3" fill="rgba(0,255,102,0.09)" stroke="rgba(0,255,102,0.25)" stroke-width="0.6"/>
  <text x="118" y="306.5" font-family="monospace" font-size="5.5" fill="rgba(0,255,102,0.85)" text-anchor="middle" letter-spacing="0.5">TRACKING</text>

  <!-- CONNECTOR 3 -->
  <line x1="212" y1="314" x2="212" y2="338" stroke="rgba(0,255,102,0.45)" stroke-width="1.5" class="line3" filter="url(#glow1)"/>
  <polygon points="212,342 207,333 217,333" fill="#00ff66" opacity="0.6"/>

  <!-- ══ NODE 4 — Meeting Booked ══ -->
  <rect x="32" y="342" width="360" height="60" rx="6" fill="#0e0e0e" stroke="rgba(0,255,102,0.3)" stroke-width="1.2"/>
  <text x="376" y="361" font-family="monospace" font-size="7" fill="rgba(0,255,102,0.25)" text-anchor="end" letter-spacing="1">04</text>
  <circle cx="66" cy="372" r="18" fill="rgba(0,255,102,0.05)" stroke="rgba(0,255,102,0.18)" stroke-width="1.2"/>
  <!-- Calendar icon -->
  <rect x="57" y="364" width="18" height="16" rx="2" fill="none" stroke="#00ff66" stroke-width="1.2" opacity="0.8"/>
  <line x1="57" y1="370" x2="75" y2="370" stroke="#00ff66" stroke-width="1" opacity="0.7"/>
  <line x1="62" y1="362" x2="62" y2="366" stroke="#00ff66" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="70" y1="362" x2="70" y2="366" stroke="#00ff66" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
  <text x="96" y="365" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.82)" font-weight="600">Meeting Booked</text>
  <text x="96" y="380" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.24)">30-min call confirmed · Calendly</text>
  <rect x="96" y="386" width="48" height="11" rx="3" fill="rgba(0,255,102,0.08)" stroke="rgba(0,255,102,0.22)" stroke-width="0.6"/>
  <text x="120" y="394.5" font-family="monospace" font-size="5.5" fill="rgba(0,255,102,0.75)" text-anchor="middle" letter-spacing="0.5">CONFIRMED</text>

  <!-- CONNECTOR 4 -->
  <line x1="212" y1="402" x2="212" y2="424" stroke="rgba(0,255,102,0.4)" stroke-width="1.5" class="line4" filter="url(#glow1)"/>
  <polygon points="212,428 207,419 217,419" fill="#00ff66" opacity="0.55"/>

  <!-- ══ NODE 5 — CONVERSION (final, highlighted) ══ -->
  <rect x="22" y="428" width="380" height="72" rx="6" fill="#0e0e0e" stroke="#00ff66" stroke-width="1.8"/>
  <!-- Outer glow ring -->
  <rect x="22" y="428" width="380" height="72" rx="6" fill="none" stroke="rgba(0,255,102,0.12)" stroke-width="10"/>
  <!-- Green left accent bar -->
  <rect x="22" y="428" width="4" height="72" rx="3 0 0 3" fill="#00ff66"/>

  <!-- Checkmark circle -->
  <circle cx="68" cy="464" r="22" fill="rgba(0,255,102,0.1)" stroke="#00ff66" stroke-width="1.5"/>
  <polyline points="58,464 65,472 80,454" fill="none" stroke="#00ff66" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text -->
  <text x="102" y="454" font-family="-apple-system,sans-serif" font-size="13" fill="#00ff66" font-weight="700">CONVERSION</text>
  <text x="102" y="470" font-family="monospace" font-size="6.5" fill="rgba(255,255,255,0.4)">Revenue generated · Pipeline closed</text>

  <!-- Step badge -->
  <text x="384" y="447" font-family="monospace" font-size="7" fill="rgba(0,255,102,0.5)" text-anchor="end" letter-spacing="1">05</text>

  <!-- Mini stat row inside final node -->
  <rect x="102" y="477" width="58" height="14" rx="3" fill="rgba(0,255,102,0.1)" stroke="rgba(0,255,102,0.3)" stroke-width="0.6"/>
  <text x="131" y="487" font-family="monospace" font-size="6" fill="#00ff66" text-anchor="middle" letter-spacing="0.5">FULLY AUTO</text>
  <rect x="168" y="477" width="58" height="14" rx="3" fill="rgba(0,255,102,0.07)" stroke="rgba(0,255,102,0.2)" stroke-width="0.6"/>
  <text x="197" y="487" font-family="monospace" font-size="6" fill="rgba(0,255,102,0.7)" text-anchor="middle" letter-spacing="0.5">0 MANUAL WORK</text>

  <!-- Footer -->
  <text x="212" y="522" font-family="monospace" font-size="5.5" fill="rgba(0,255,102,0.2)" text-anchor="middle" letter-spacing="2.5">COMAA FLOW ENGINE</text>
</svg>
