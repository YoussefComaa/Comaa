      .flow-line { stroke-dasharray: 6,4; animation: flow 1.1s linear infinite; }
      .flow-line-2 { stroke-dasharray: 6,4; animation: flow 1.1s linear 0.28s infinite; }
      .flow-line-3 { stroke-dasharray: 6,4; animation: flow 1.1s linear 0.56s infinite; }
