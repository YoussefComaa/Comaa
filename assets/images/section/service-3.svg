<svg width="424" height="530" viewBox="0 0 424 530" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="424" height="530" fill="#080808"/>

  <!-- Grid dots -->
  <pattern id="dots3" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="424" height="530" fill="url(#dots3)"/>

  <!-- Vertical pipeline line -->
  <line x1="212" y1="80" x2="212" y2="450" stroke="rgba(0,255,136,0.15)" stroke-width="2"/>

  <!-- Step 1 — Research -->
  <rect x="96" y="76" width="232" height="64" rx="5" fill="#0f0f0f" stroke="#00ff88" stroke-width="1.5"/>
  <rect x="96" y="76" width="232" height="64" rx="5" fill="rgba(0,255,136,0.04)"/>
  <!-- Icon -->
  <circle cx="128" cy="108" r="14" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.4)" stroke-width="1"/>
  <circle cx="128" cy="105" r="5" fill="none" stroke="#00ff88" stroke-width="1.2"/>
  <line x1="128" y1="111" x2="128" y2="116" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Text lines -->
  <line x1="152" y1="101" x2="284" y2="101" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="152" y1="112" x2="250" y2="112" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Step label -->
  <text x="296" y="96" font-family="monospace" font-size="9" fill="rgba(0,255,136,0.5)" letter-spacing="1">01</text>
  <!-- Status dot -->
  <circle cx="308" cy="112" r="5" fill="#00ff88"/>

  <!-- Arrow connector 1 -->
  <line x1="212" y1="140" x2="212" y2="168" stroke="rgba(0,255,136,0.4)" stroke-width="1.5"/>
  <polygon points="212,172 207,162 217,162" fill="#00ff88" opacity="0.6"/>

  <!-- Step 2 — Copywriting -->
  <rect x="96" y="172" width="232" height="64" rx="5" fill="#0f0f0f" stroke="rgba(0,255,136,0.6)" stroke-width="1.5"/>
  <rect x="96" y="172" width="232" height="64" rx="5" fill="rgba(0,255,136,0.03)"/>
  <!-- Icon - pencil/write -->
  <circle cx="128" cy="204" r="14" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.4)" stroke-width="1"/>
  <line x1="122" y1="210" x2="134" y2="198" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="210" x2="136" y2="210" stroke="#00ff88" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Text lines -->
  <line x1="152" y1="197" x2="284" y2="197" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="152" y1="208" x2="240" y2="208" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="296" y="192" font-family="monospace" font-size="9" fill="rgba(0,255,136,0.5)" letter-spacing="1">02</text>
  <circle cx="308" cy="208" r="5" fill="#00ff88"/>

  <!-- Arrow connector 2 -->
  <line x1="212" y1="236" x2="212" y2="264" stroke="rgba(0,255,136,0.4)" stroke-width="1.5"/>
  <polygon points="212,268 207,258 217,258" fill="#00ff88" opacity="0.6"/>

  <!-- Step 3 — Send (active/highlighted) -->
  <rect x="86" y="268" width="252" height="68" rx="5" fill="#0f0f0f" stroke="#00ff88" stroke-width="2"/>
  <rect x="86" y="268" width="252" height="68" rx="5" fill="rgba(0,255,136,0.07)"/>
  <!-- Glow -->
  <rect x="86" y="268" width="252" height="68" rx="5" fill="none" stroke="rgba(0,255,136,0.15)" stroke-width="10"/>
  <!-- Icon - send/email -->
  <circle cx="122" cy="302" r="14" fill="rgba(0,255,136,0.15)" stroke="#00ff88" stroke-width="1.2"/>
  <polygon points="114,296 132,302 114,308 118,302" fill="#00ff88"/>
  <!-- Text lines -->
  <line x1="146" y1="295" x2="294" y2="295" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="146" y1="306" x2="260" y2="306" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="304" y="290" font-family="monospace" font-size="9" fill="#00ff88" letter-spacing="1">03</text>
  <circle cx="316" cy="306" r="5" fill="#00ff88"/>
  <!-- "LIVE" badge -->
  <rect x="146" y="313" width="36" height="14" rx="3" fill="rgba(0,255,136,0.2)"/>
  <text x="164" y="323" font-family="monospace" font-size="7" fill="#00ff88" text-anchor="middle" letter-spacing="1">LIVE</text>

  <!-- Arrow connector 3 -->
  <line x1="212" y1="336" x2="212" y2="364" stroke="rgba(0,255,136,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="212,368 207,358 217,358" fill="rgba(0,255,136,0.4)"/>

  <!-- Step 4 — Results -->
  <rect x="96" y="368" width="232" height="64" rx="5" fill="#0f0f0f" stroke="rgba(0,255,136,0.3)" stroke-width="1"/>
  <!-- Mini bar chart inside -->
  <circle cx="128" cy="400" r="14" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.35)" stroke-width="1"/>
  <rect x="120" y="403" width="5" height="7" rx="1" fill="rgba(0,255,136,0.4)"/>
  <rect x="127" y="397" width="5" height="13" rx="1" fill="rgba(0,255,136,0.6)"/>
  <rect x="134" y="394" width="5" height="16" rx="1" fill="#00ff88"/>
  <!-- Text lines -->
  <line x1="152" y1="393" x2="280" y2="393" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="152" y1="404" x2="236" y2="404" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="296" y="388" font-family="monospace" font-size="9" fill="rgba(0,255,136,0.4)" letter-spacing="1">04</text>
  <circle cx="308" cy="404" r="5" fill="rgba(0,255,136,0.5)"/>

  <!-- Label -->
  <rect x="136" y="456" width="152" height="26" rx="4" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
  <text x="212" y="474" font-family="monospace" font-size="10" fill="#00ff88" text-anchor="middle" letter-spacing="2">AUTOMATED</text>
</svg>
